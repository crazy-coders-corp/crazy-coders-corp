<!DOCTYPE html>
<html>
<head>
    <title>Asset HTML Compiler</title>
    <style>
        :root { --blue: #1a73e8; --green: #34a853; --bg: #f8f9fa; }
        body { font-family: system-ui, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .card { 
            background: #fff; padding: 2.5rem; border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
            width: 100%; max-width: 400px; text-align: center; 
        }
        
        h2 { margin: 0 0 1.5rem; color: #202124; font-weight: 600; }
        
        .toggle-wrapper { 
            display: flex; align-items: center; justify-content: space-between; 
            background: #eee; padding: 12px 16px; border-radius: 12px; 
            margin-bottom: 20px; cursor: pointer; 
        }

        .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; transition: .3s; border-radius: 34px; }
        .slider:before { 
            position: absolute; content: ""; height: 20px; width: 20px; 
            left: 3px; bottom: 3px; background: #fff; transition: .3s; 
            border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
        }
        input:checked + .slider { background: var(--blue); }
        input:checked + .slider:before { transform: translateX(20px); }
        
        .field { margin-bottom: 1.5rem; text-align: left; }
        label { font-size: 0.75rem; font-weight: 700; color: #70757a; text-transform: uppercase; display: block; margin-bottom: 8px; letter-spacing: 0.5px; }
        
        button, input[type="file"] { 
            width: 100%; padding: 14px; border-radius: 12px; border: 2px solid transparent; 
            font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-sizing: border-box; 
        }
        input[type="file"] { background: #f1f3f4; font-size: 0.8rem; }
        
        #connectBtn { background: #fff; color: var(--blue); border-color: #e8f0fe; margin-bottom: 10px; }
        #connectBtn:hover, #tabBtn:hover { 
            transform: translateY(-3px);
            border-color: var(--blue);
            box-shadow: 0 10px 30px rgba(26, 115, 232, 0.15);
        }

        #tabBtn { background: var(--blue); color: #fff; font-size: 1rem; margin-top: 10px; }
        
        #status { font-size: 0.8rem; font-weight: 700; margin-top: 5px; color: #d93025; text-align: center; }
        .success { color: var(--green) !important; }
        
        footer { 
            margin-top: 2rem; font-size: 0.7rem; color: #70757a; 
            text-transform: uppercase; letter-spacing: 1px; font-weight: 700; 
        }

        [hidden] { display: none !important; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Asset HTML Compiler</h2>
        <label class="toggle-wrapper">
            <span style="font-weight:600;font-size:0.9rem;color:#444">Enable Local Assets</span>
            <div class="switch"><input type="checkbox" id="localToggle"><span class="slider"></span></div>
        </label>
        
        <div id="assetSection" class="field" hidden>
            <label>Assets Folder</label>
            <input type="file" id="folderInput" webkitdirectory directory multiple hidden>
            <button id="connectBtn">Connect Folder</button>
            <div id="status">Folder not connected</div>
        </div>

        <div class="field">
            <label>Main HTML File</label>
            <input type="file" id="htmlInput" accept=".html,.htm">
        </div>
        <button id="tabBtn">Open in New Tab</button>
    </div>

    <footer>Made by the Compiler Team of the <a href="https://crazy-coders-corp.pages.dev" target="_blank">CCC</a></footer>

<script>
    let FILE_MAP = {};
    const $ = id => document.getElementById(id);

    function vfsRuntime() {
        const VFS = window.VFS || parent.VFS || {};
        const res = u => {
            if(!u || typeof u !== 'string' || u.startsWith('blob:') || u.startsWith('data:')) return null;
            const n = u.toLowerCase().split(/[?#]/)[0].split('/').pop();
            return VFS[n] || VFS[u.toLowerCase()] || null;
        };
        const _f = window.fetch; window.fetch = (u, o) => {
            const l = res(u.toString());
            if(l && o) { delete o.mode; delete o.credentials; }
            return l ? _f(l, o) : _f(u, o);
        };
        const _o = window.XMLHttpRequest.prototype.open;
        window.XMLHttpRequest.prototype.open = function(m, u) { return _o.call(this, m, res(u.toString()) || u, true); };
        const _S = HTMLScriptElement.prototype;
        const _s = Object.getOwnPropertyDescriptor(_S, 'src').set;
        Object.defineProperty(_S, 'src', { set: function(v) { _s.call(this, res(v) || v); } });
        const _W = window.Worker;
        window.Worker = function(u, o) { return new _W(res(u.toString()) || u, o); };
    }
    const INTERCEPTOR = `(${vfsRuntime.toString()})();`;

    $('localToggle').onchange = (e) => {
        $('assetSection').hidden = !e.target.checked;
        if(!e.target.checked) { 
            FILE_MAP = {}; 
            $('status').innerText = "Folder not connected"; 
            $('status').className = ""; 
        }
    };

    $('connectBtn').onclick = () => $('folderInput').click();

    $('folderInput').onchange = async (e) => {
        const files = Array.from(e.target.files);
        if(!files.length) return;
        
        FILE_MAP = {};
        for(const f of files) {
            const path = f.webkitRelativePath.toLowerCase().split('/').slice(1).join('/');
            const name = f.name.toLowerCase();
            let data = f;

            if (name.endsWith('.js')) {
                data = new Blob([INTERCEPTOR + "\n", await f.text()], { type: 'application/javascript' });
            }
            const url = URL.createObjectURL(data);
            FILE_MAP[path] = FILE_MAP[name] = url;
        }
        
        $('status').innerText = `Connected: ${files[0].webkitRelativePath.split('/')[0]} (${files.length} files)`;
        $('status').className = "success";
    };

    $('tabBtn').onclick = async () => {
        const file = $('htmlInput').files[0];
        if (!file) return alert("Select HTML file.");
        let html = await file.text();

        if ($('localToggle').checked) {
            if (!Object.keys(FILE_MAP).length) return alert("Connect a folder!");
            html = html.replace(/<base\s+href=["']([^"']+)["'][^>]*>?/gi, "");
            
            Object.keys(FILE_MAP).forEach(name => {
                if (name.includes('.')) {
                    const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const re = new RegExp('(?<=["\\\'\\(])' + escaped + '(?=["\\\'\\)?])', 'g');
                    html = html.replace(re, FILE_MAP[name]);
                }
            });
            html = `<script>${INTERCEPTOR}window.VFS=${JSON.stringify(FILE_MAP)};<\/script>` + html;
        }

        const w = window.open('about:blank', '_blank');
        w.VFS = FILE_MAP;
        w.document.write(html);
        w.document.close();
    };
</script>
</body>
</html>
